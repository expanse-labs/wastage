apiVersion: apps/v1
kind: Deployment
metadata:
  name: wastage
  namespace: expanse-app
  labels:
    app: wastage
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wastage
  template:
    metadata:
      labels:
        app: wastage
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: depot-registry
      containers:
        - name: wastage
          image: registry.depot.dev/h04kh3b12g:wastage-e7213a2
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: wastage-database-url
            - name: DATABASE_SSL
              value: "true"
            - name: IP_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: wastage-ip-hash-salt
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: aws-secret-access-key
            - name: AWS_REGION
              value: eu-west-2
            - name: EMAIL_FROM
              value: "reports@getexpanse.io"
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
